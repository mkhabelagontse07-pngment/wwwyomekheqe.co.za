<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>YOME KWEQE | Home</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family:'Segoe UI', sans-serif;
  background:#0b0b0b;
  color:white;
}

/* NAV */
header {
  display:flex;
  justify-content:space-between;
  padding:15px 30px;
  background:black;
}

.logo {
  color:gold;
  font-weight:bold;
  font-size:1.5rem;
}

nav a {
  color:white;
  margin:0 10px;
  text-decoration:none;
}

nav a:hover {color:gold;}

/* HERO */
.hero {
  height:90vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  background:linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),
  url('WhatsApp Image 2026-03-17 at 12.00.04.jpeg') center/cover;
  animation:zoom 15s infinite alternate;
}

@keyframes zoom {
  from{background-size:100%;}
  to{background-size:120%;}
}

.hero h1 {
  font-size:3rem;
  color:gold;
}

.btn {
  padding:12px 25px;
  background:gold;
  border:none;
  cursor:pointer;
  margin-top:20px;
}

/* PRODUCTS */
.products {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  padding:30px;
}

.card {
  background:#151515;
  padding:15px;
  border-radius:10px;
  transition:0.3s;
}

.card:hover {
  transform:scale(1.05);
}

.card img {
  width:100%;
  border-radius:10px;
}

.price {
  color:gold;
}

footer {
  text-align:center;
  padding:20px;
  background:black;
}
</style>
</head>

<body>

<header>
<div class="logo">YOME KWEQE</div>
<nav>
<a href="index.html">Home</a>
<a href="order.html">Place Order</a>
<a href="about.html">About Us</a>
</nav>
</header>

<section class="hero">
<div>
<h1>YOME KWEQE</h1>
<p>Premium Streetwear | Est. 2026</p>
<a href="order.html"><button class="btn">Shop Now</button></a>
</div>
</section>

<h2 style="text-align:center;color:gold;">Our Collection</h2>

<div class="products">

<div class="card">
<img src="WhatsApp Image 2026-03-17 at 12.00.00.jpeg">
<h3>Classic Tee</h3>
<p>Premium cotton streetwear</p>
<p class="price">R250</p>
</div>

<div class="card">
<img src="WhatsApp Image 2026-03-17 at 11.59.55.jpeg">
<h3>Street Hoodie</h3>
<p>Warm & bold design</p>
<p class="price">R550</p>
</div>

<div class="card">
<img src="WhatsApp Image 2026-03-17 at 11.59.48.jpeg">
<h3>Urban Cap</h3>
<p>Clean modern style</p>
<p class="price">R180</p>
</div>

</div>

<footer>
<p>© 2026 YOME KWEQE</p>
</footer>

</body>
</html>
